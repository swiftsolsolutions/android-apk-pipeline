name: Publish to Play

# Builds a signed AAB and (if the PLAY_SERVICE_ACCOUNT_JSON secret is set) uploads
# it to a Play track via fastlane. Also publishes the AAB as a downloadable
# GitHub Release so it can be grabbed manually for the FIRST upload (which must be
# done by hand in the Console — the API can't create the app or its first release).
#
# Pairs with app/build.gradle.kts reading:
#     versionCode = (System.getenv("VERSION_CODE")?.toIntOrNull()) ?: <N>
# so the CI-computed versionCode below wins on publish, while local/validation
# builds fall back to <N>.

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track: internal | alpha (closed) | beta (open) | production | <custom closed track name>"
        default: "internal"
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"      # keep in lockstep with references/versions.md
      - name: Compute a unique, always-increasing versionCode
        # Epoch seconds: monotonic + unique per build (even on re-runs), and well
        # under Play's 2,100,000,000 versionCode ceiling until ~2036. This is the
        # thing that prevents the two Play rollout errors:
        #   "This release does not add or remove any app bundles."
        #   "…doesn't allow any existing users to upgrade to the newly added app bundles."
        # Both mean the release's versionCode is not STRICTLY HIGHER than what's
        # already active on the track. Never hand-set versionCode for publishes;
        # let this assign it so every release is a valid upgrade.
        run: echo "VERSION_CODE=$(date +%s)" >> "$GITHUB_ENV"
      - name: Build signed AAB
        run: gradle bundleRelease --no-daemon --stacktrace
      - name: Publish AAB as a downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aab-${{ github.run_number }}
          name: AAB ${{ github.run_number }}
          prerelease: true
          body: "Signed Android App Bundle (.aab) for Play Console upload."
          files: app/build/outputs/bundle/release/*.aab
      - name: Set up Ruby + fastlane
        if: ${{ env.PLAY_JSON != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Write Play service account key
        if: ${{ env.PLAY_JSON != '' }}
        run: printf '%s' "$PLAY_JSON" > fastlane/play-service-account.json
      - name: Upload to Play (${{ inputs.track }})
        if: ${{ env.PLAY_JSON != '' }}
        run: bundle exec fastlane deploy track:${{ inputs.track }}
      - name: Not configured yet
        if: ${{ env.PLAY_JSON == '' }}
        run: echo "No PLAY_SERVICE_ACCOUNT_JSON secret set. Built the AAB (see Releases); skipped Play upload."
