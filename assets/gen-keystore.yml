name: Generate upload keystore (run once)
on:
  workflow_dispatch:
    inputs:
      password:
        description: "Choose a keystore password (save it!)"
        required: true
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - name: Create keystore + base64
        run: |
          keytool -genkeypair -v -keystore upload.keystore \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ github.event.inputs.password }}" \
            -keypass  "${{ github.event.inputs.password }}" \
            -dname "CN=App, OU=Dev, O=Personal, C=US"
          base64 -w0 upload.keystore > keystore.b64
      - uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: |
            upload.keystore
            keystore.b64
