name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      buildType:
        description: "debug or release"
        type: choice
        options: [ debug, release ]
        default: release

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Decode release keystore (if secret present)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"


      - name: Build APK
        env:
          BUILD_TYPE: ${{ github.event.inputs.buildType || 'release' }}
        run: |
          set -eo pipefail
          if [ "$BUILD_TYPE" = "debug" ]; then TASK="assembleDebug"; else TASK="assembleRelease"; fi

          SIGN_ARGS=""
          if [ -f "$RUNNER_TEMP/release.keystore" ] && [ "$BUILD_TYPE" = "release" ]; then
            SIGN_ARGS="-Pandroid.injected.signing.store.file=$RUNNER_TEMP/release.keystore \
                       -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
                       -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
                       -Pandroid.injected.signing.key.password=$KEY_PASSWORD"
          fi

          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew $TASK --no-daemon --stacktrace $SIGN_ARGS 2>&1 | tee /tmp/build.log
          else
            gradle $TASK --no-daemon --stacktrace $SIGN_ARGS 2>&1 | tee /tmp/build.log
          fi

      - name: Capture build error on failure
        if: failure()
        run: |
          { grep -E "^e: |: error:|Unresolved|Could not find|Could not resolve|Duplicate class|none of the following|Type mismatch|Compilation error" /tmp/build.log | head -60; echo "----TAIL----"; tail -c 2500 /tmp/build.log; } > build_error.txt 2>/dev/null || echo "no log captured" > build_error.txt
          git config user.name "ci"
          git config user.email "ci@example.com"
          git add build_error.txt
          git commit -m "ci: capture build error [skip ci]" || exit 0
          git push || true

      - name: Find the built APK
        id: apk
        run: |
          APK=$(find . -path '*/build/outputs/apk/*.apk' | grep -v 'unsigned' | head -n1)
          if [ -z "$APK" ]; then APK=$(find . -path '*/build/outputs/apk/*.apk' | head -n1); fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built: $APK"

      - name: Upload APK as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: true
          files: ${{ steps.apk.outputs.path }}
